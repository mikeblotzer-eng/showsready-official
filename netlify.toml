# Netlify configuration for ShowsReady Frontend
[build]
  base = "frontend/"
  publish = "frontend/"
  command = "echo 'No build needed for static HTML'"

[[redirects]]
  from = "/api/*"
  to = "https://showsready-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
