<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — ShowsReady</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:#111010;color:#f9f6f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{text-align:center;max-width:420px;}
.star{font-size:2.8rem;color:#b8935a;margin-bottom:24px;}
h1{font-family:'Libre Baskerville',serif;font-size:2rem;font-weight:400;margin-bottom:10px;}
p{font-size:.88rem;font-weight:300;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:32px;}
.btn{display:inline-block;background:#b8935a;color:#111010;font-family:'Jost',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:13px 32px;border-radius:2px;text-decoration:none;transition:background .18s;}
.btn:hover{background:#d4af72;}
.note{font-size:.65rem;color:rgba(255,255,255,.2);margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="star">✦</div>
  <h1>You're all set.</h1>
  <p id="msg">Your plan has been activated. You're ready to create walkthrough videos that win showings.</p>
  <a href="app.html" class="btn">Open ShowsReady Studio →</a>
  <div class="note">A receipt has been sent to your email.</div>
</div>
<script>
// Store email from Stripe session if passed back
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');
if (sessionId) {
  fetch(`https://api.showsready.com/api/session?session_id=${sessionId}`)
    .then(r => r.json())
    .then(data => {
      if (data.email) {
        localStorage.setItem('sr_email', data.email);
        document.getElementById('msg').textContent =
          `Plan activated for ${data.email}. You're ready to create walkthrough videos that win showings.`;
      }
    }).catch(() => {});
}
</script>
</body>
</html>
